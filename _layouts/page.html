---
layout: default
---

<article class="page" aria-labelledby="page-title">
  <div class="container">
    <header class="page__header">
      <h1 id="page-title" class="page__title">{{ page.title }}</h1>
      {% if page.description %}
        <p class="page__description">{{ page.description }}</p>
      {% endif %}
    </header>

    <div class="page__content">
      {{ content }}
    </div>
  </div>
</article>

<style>
  .page {
    padding: 2rem 0;
  }

  .page__header {
    text-align: center;
    margin-bottom: 2rem;
  }

  .page__title {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }

  .page__description {
    font-size: 1.25rem;
    color: #64748b;
  }

  .page__content {
    max-width: 800px;
    margin: 0 auto;
  }
</style>
