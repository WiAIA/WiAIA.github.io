<!-- Mentor Form Modal -->
<div id="mentor-modal" class="modal" aria-hidden="true">
  <div class="modal-overlay" tabindex="-1" data-close-modal></div>
  <div class="modal-container" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <button class="modal-close" data-close-modal aria-label="Close modal">
      <i class="fas fa-times"></i>
    </button>

    <div class="modal-content">
      <h2 id="modal-title" class="modal-title">Find a Mentor</h2>
      <p class="modal-description">Fill out the form below and we'll match you with a mentor who can help you achieve your career goals in AI and analytics.</p>

      <form action="https://formspree.io/f/mvzjgbnr" method="POST" class="mentor-form">
        <div class="form-group">
          <label for="mentor-email" class="form-label">Your email *</label>
          <input type="email" id="mentor-email" name="email" required class="form-input" placeholder="your.email@example.com">
        </div>

        <div class="form-group">
          <label for="mentor-name" class="form-label">Your name *</label>
          <input type="text" id="mentor-name" name="name" required class="form-input" placeholder="Jane Doe">
        </div>

        <div class="form-group">
          <label for="mentor-background" class="form-label">Your background</label>
          <select id="mentor-background" name="background" class="form-select">
            <option value="">Select your background</option>
            <option value="student">Student</option>
            <option value="early-career">Early Career (0-2 years)</option>
            <option value="mid-career">Mid Career (3-7 years)</option>
            <option value="senior">Senior (8+ years)</option>
            <option value="career-transition">Career Transition</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mentor-interests" class="form-label">Areas of interest</label>
          <textarea id="mentor-interests" name="interests" class="form-textarea" rows="3" placeholder="e.g., Machine Learning, Data Science, AI Research, Career Development..."></textarea>
        </div>

        <div class="form-group">
          <label for="mentor-goals" class="form-label">Your goals *</label>
          <textarea id="mentor-goals" name="goals" required class="form-textarea" rows="4" placeholder="Tell us what you hope to achieve through mentorship..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Submit Application</button>
      </form>
    </div>
  </div>
</div>

<style>
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal.active {
    display: flex;
  }

  .modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
  }

  .modal-container {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    z-index: 1001;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: transparent;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted-foreground);
    transition: color 0.2s;
    z-index: 10;
  }

  .modal-close:hover {
    color: var(--foreground);
  }

  .modal-content {
    padding: 2rem;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    color: var(--foreground);
    font-weight: 400;
  }

  .modal-description {
    font-family: var(--font-body);
    color: var(--muted-foreground);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .mentor-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-label {
    font-family: var(--font-body);
    font-weight: 500;
    color: var(--foreground);
    font-size: 0.875rem;
  }

  .form-input,
  .form-select,
  .form-textarea {
    padding: 0.75rem 1rem;
    border: 1px solid var(--input);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 1rem;
    background: var(--background);
    color: var(--foreground);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--ring);
  }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
  }

  .btn-block {
    width: 100%;
    margin-top: 0.5rem;
  }

  @media (max-width: 640px) {
    .modal-content {
      padding: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
    }
  }
</style>

<script>
  (function() {
    const modal = document.getElementById('mentor-modal');
    const openButtons = document.querySelectorAll('[data-open-mentor-form]');
    const closeButtons = document.querySelectorAll('[data-close-modal]');

    // Open modal
    openButtons.forEach(button => {
      button.addEventListener('click', (e) => {
        e.preventDefault();
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        // Focus on first input
        setTimeout(() => {
          const firstInput = modal.querySelector('input, select, textarea');
          if (firstInput) firstInput.focus();
        }, 100);
      });
    });

    // Close modal
    closeButtons.forEach(button => {
      button.addEventListener('click', closeModal);
    });

    modal.querySelector('.modal-overlay').addEventListener('click', closeModal);

    function closeModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    // Close on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeModal();
      }
    });

    // Handle form submission
    const form = modal.querySelector('form');
    form.addEventListener('submit', function() {
      // Optionally show success message or redirect
      setTimeout(() => {
        closeModal();
        form.reset();
      }, 1000);
    });
  })();
</script>
