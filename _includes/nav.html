<nav class="nav" role="navigation" aria-label="Main navigation">
  <div class="container nav__container">
    <a href="{{ '/' | relative_url }}" class="nav__logo" aria-label="Home">
      <img src="/assets/images/logo.svg" alt="WiAIA - Women in AI & Analytics" class="nav__logo-img">
    </a>

    <button class="nav__toggle" type="button" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="nav-menu">
      <span class="nav__toggle-line"></span>
      <span class="nav__toggle-line"></span>
      <span class="nav__toggle-line"></span>
    </button>

    <ul class="nav__menu" id="nav-menu">
      <li class="nav__item">
        <a href="{{ '/' | relative_url }}" class="nav__link {% if page.url == '/' %}nav__link--active{% endif %}">Home</a>
      </li>
      <li class="nav__item">
        <a href="{{ '/about/' | relative_url }}" class="nav__link {% if page.url == '/about/' %}nav__link--active{% endif %}">About</a>
      </li>
      <li class="nav__item">
        <a href="{{ '/mentorship/' | relative_url }}" class="nav__link {% if page.url == '/mentorship/' %}nav__link--active{% endif %}">Mentorship</a>
      </li>
      <li class="nav__item">
        <a href="{{ '/blog/' | relative_url }}" class="nav__link {% if page.url == '/blog/' %}nav__link--active{% endif %}">Blog</a>
      </li>
      <li class="nav__item">
        <a href="{{ '/contact/' | relative_url }}" class="nav__link {% if page.url == '/contact/' %}nav__link--active{% endif %}">Contact</a>
      </li>
    </ul>
  </div>
</nav>

<style>
  .nav {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 1000;
  }

  .nav__container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
  }

  .nav__logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    position: relative;
    transition: var(--transition-base);
  }

  .nav__logo-img {
    height: 45px;
    width: auto;
  }

  .nav__logo:hover {
    opacity: 0.9;
  }

  .nav__toggle {
    display: none;
    flex-direction: column;
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    cursor: pointer;
    padding: 0.5rem;
    transition: var(--transition-base);
  }

  .nav__toggle:hover {
    border-color: var(--accent);
  }

  .nav__toggle-line {
    width: 20px;
    height: 2px;
    background-color: var(--foreground);
    margin: 3px 0;
    transition: var(--transition-base);
  }

  .nav__menu {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 2rem;
  }

  .nav__link {
    font-family: var(--font-body);
    font-size: 0.875rem;
    font-weight: 500;
    text-decoration: none;
    color: var(--muted-foreground);
    position: relative;
    padding: 0.5rem 0;
    transition: var(--transition-base);
    letter-spacing: 0.05em;
  }

  .nav__link::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 1px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: right;
    transition: var(--transition-base);
  }

  .nav__link:hover,
  .nav__link--active {
    color: var(--foreground);
  }

  .nav__link:hover::after,
  .nav__link--active::after {
    transform: scaleX(1);
    transform-origin: left;
  }

  @media (max-width: 768px) {
    .nav__toggle {
      display: flex;
    }

    .nav__menu {
      display: none;
      flex-direction: column;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--card);
      padding: 1rem;
      border-top: 1px solid var(--border);
      gap: 0;
      box-shadow: var(--shadow-md);
    }

    .nav__menu.active {
      display: flex;
    }

    .nav__item {
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }

    .nav__item:last-child {
      border-bottom: none;
    }
  }
</style>

<script>
  // Mobile navigation toggle
  document.addEventListener('DOMContentLoaded', function() {
    const toggle = document.querySelector('.nav__toggle');
    const menu = document.querySelector('.nav__menu');

    if (toggle && menu) {
      toggle.addEventListener('click', function() {
        menu.classList.toggle('active');
        const isExpanded = menu.classList.contains('active');
        toggle.setAttribute('aria-expanded', isExpanded);
      });
    }
  });
</script>
