<!-- Mentor Application Modal -->
<div id="mentor-application-modal" class="modal" aria-hidden="true">
  <div class="modal-overlay" tabindex="-1" data-close-mentor-application-modal></div>
  <div class="modal-container" role="dialog" aria-modal="true" aria-labelledby="mentor-application-title">
    <button class="modal-close" data-close-mentor-application-modal aria-label="Close modal">
      <i class="fas fa-times"></i>
    </button>

    <div class="modal-content">
      <h2 id="mentor-application-title" class="modal-title">Become a Mentor</h2>
      <p class="modal-description">Share your experience and help guide the next generation of women in AI and analytics. Fill out the form below to start your mentorship journey.</p>

      <form action="https://formspree.io/f/xaqgndgk" method="POST" class="mentor-form">
        <div class="form-group">
          <label for="mentor-app-email" class="form-label">Your email *</label>
          <input type="email" id="mentor-app-email" name="email" required class="form-input" placeholder="your.email@example.com">
        </div>

        <div class="form-group">
          <label for="mentor-app-name" class="form-label">Your name *</label>
          <input type="text" id="mentor-app-name" name="name" required class="form-input" placeholder="Jane Doe">
        </div>

        <div class="form-group">
          <label for="mentor-app-expertise" class="form-label">Areas of expertise *</label>
          <textarea id="mentor-app-expertise" name="expertise" required class="form-textarea" rows="3" placeholder="e.g., Machine Learning, Data Science, AI Ethics, Career Development, Research..."></textarea>
        </div>

        <div class="form-group">
          <label for="mentor-app-experience" class="form-label">Years of experience *</label>
          <select id="mentor-app-experience" name="experience" required class="form-select">
            <option value="">Select your experience level</option>
            <option value="1-3">1-3 years</option>
            <option value="3-5">3-5 years</option>
            <option value="5-10">5-10 years</option>
            <option value="10+">10+ years</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mentor-app-current-role" class="form-label">Current role/company</label>
          <input type="text" id="mentor-app-current-role" name="current_role" class="form-input" placeholder="e.g., Senior Data Scientist at Tech Company">
        </div>

        <div class="form-group">
          <label for="mentor-app-availability" class="form-label">Availability</label>
          <select id="mentor-app-availability" name="availability" class="form-select">
            <option value="">Select your availability</option>
            <option value="1-2-hours">1-2 hours per month</option>
            <option value="2-4-hours">2-4 hours per month</option>
            <option value="4-plus-hours">4+ hours per month</option>
          </select>
        </div>

        <div class="form-group">
          <label for="mentor-app-motivation" class="form-label">Why do you want to become a mentor? *</label>
          <textarea id="mentor-app-motivation" name="motivation" required class="form-textarea" rows="4" placeholder="Tell us what motivates you to mentor others..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Submit Application</button>
      </form>
    </div>
  </div>
</div>

<style>
  .modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .modal.active {
    display: flex;
  }

  .modal-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
  }

  .modal-container {
    position: relative;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    z-index: 1001;
  }

  .modal-close {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: transparent;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--muted-foreground);
    transition: color 0.2s;
    z-index: 10;
  }

  .modal-close:hover {
    color: var(--foreground);
  }

  .modal-content {
    padding: 2rem;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 1.75rem;
    margin-bottom: 0.5rem;
    color: var(--foreground);
    font-weight: 400;
  }

  .modal-description {
    font-family: var(--font-body);
    color: var(--muted-foreground);
    margin-bottom: 1.5rem;
    line-height: 1.6;
  }

  .mentor-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-label {
    font-family: var(--font-body);
    font-weight: 500;
    color: var(--foreground);
    font-size: 0.875rem;
  }

  .form-input,
  .form-select,
  .form-textarea {
    padding: 0.75rem 1rem;
    border: 1px solid var(--input);
    border-radius: var(--radius-md);
    font-family: var(--font-body);
    font-size: 1rem;
    background: var(--background);
    color: var(--foreground);
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--ring);
  }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
  }

  .btn-block {
    width: 100%;
    margin-top: 0.5rem;
  }

  @media (max-width: 640px) {
    .modal-content {
      padding: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
    }
  }
</style>

<script>
  (function() {
    const modal = document.getElementById('mentor-application-modal');
    const openButtons = document.querySelectorAll('[data-open-mentor-application-form]');
    const closeButtons = document.querySelectorAll('[data-close-mentor-application-modal]');

    // Open modal
    openButtons.forEach(button => {
      button.addEventListener('click', (e) => {
        e.preventDefault();
        modal.classList.add('active');
        modal.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';

        // Focus on first input
        setTimeout(() => {
          const firstInput = modal.querySelector('input, select, textarea');
          if (firstInput) firstInput.focus();
        }, 100);
      });
    });

    // Close modal
    closeButtons.forEach(button => {
      button.addEventListener('click', closeMentorApplicationModal);
    });

    modal.querySelector('.modal-overlay').addEventListener('click', closeMentorApplicationModal);

    function closeMentorApplicationModal() {
      modal.classList.remove('active');
      modal.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    // Close on ESC key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modal.classList.contains('active')) {
        closeMentorApplicationModal();
      }
    });

    // Handle form submission
    const form = modal.querySelector('form');
    form.addEventListener('submit', function() {
      // Optionally show success message or redirect
      setTimeout(() => {
        closeMentorApplicationModal();
        form.reset();
      }, 1000);
    });
  })();
</script>
