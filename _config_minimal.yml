# Minimal Jekyll config for testing
title: "Women in AI & Analytics Mentoring"
description: "Empowering women in AI, Data Science, Machine Learning, and Analytics through mentorship, collaboration, and leadership opportunities"
author: "Women in AI & Analytics Mentoring"
url: "https://wiaia.github.io"
baseurl: ""
permalink: pretty

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  events:
    output: true
    permalink: /events/:title/
  team:
    output: false

# Default layouts
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "WIAA Team"

# Plugins
plugins:
  - jekyll-feed

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - .github/

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Build settings
sass:
  style: compressed