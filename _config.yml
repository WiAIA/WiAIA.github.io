# Site settings
title: "WiAIA - Women in AI & Analytics"
description: "Empowering the Next Generation of Women in AI & Analytics through mentorship, collaboration, and community"
author: "WiAIA - Women in AI & Analytics"
email: "wiaia@proton.me"

# URL configuration
# url: "https://wiaia.github.io"  # or your custom domain
# baseurl: ""  # leave empty for root domain
permalink: pretty

# Social media
github_username: wiaia
linkedin: company/wiaia
twitter: wiaia_org

# Theme settings
# Using minimal theme for testing

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  events:
    output: true
    permalink: /events/:title/
  team:
    output: false

# Default layouts
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "WIAA Team"

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# GitHub Pages specific settings
github:
  source: "."

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - .git/
  - .github/

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# SEO settings
lang: en_US
timezone: America/New_York

# Build settings
sass:
  sass_dir: _sass
  style: compressed